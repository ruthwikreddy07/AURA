version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: aura
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-changeme}@db:5432/aura
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-supersecuresecretkey1234567890abcdef}
      JWT_ALGORITHM: RS256
      TOKEN_PRIVATE_KEY_PATH: keys/private.pem
      TOKEN_PUBLIC_KEY_PATH: keys/public.pem
      DEBUG: "false"
      ENVIRONMENT: production
    volumes:
      - ./backend/keys:/app/keys

volumes:
  pgdata:
